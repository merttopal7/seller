events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  client_max_body_size 50M;

  upstream backend  { server backend:5000; }
  upstream frontend { server frontend:3000; }

  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Uploaded files served by backend
    location /uploads/ {
      proxy_pass       http://backend;
      proxy_set_header Host $host;
    }

    # API — routed through Next.js so that Next.js API routes
    # (/api/messages/start, /api/ads/*/favorite, /api/auth/token, etc.)
    # are handled correctly before the catch-all proxies the rest to Express.
    location /api/ {
      proxy_pass           http://frontend;
      proxy_http_version   1.1;
      proxy_set_header     Host $host;
      proxy_set_header     X-Real-IP $remote_addr;
      proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header     X-Forwarded-Proto $scheme;
      proxy_read_timeout   60s;
    }

    # Socket.IO — requires WebSocket upgrade
    location /socket.io/ {
      proxy_pass           http://backend;
      proxy_http_version   1.1;
      proxy_set_header     Upgrade $http_upgrade;
      proxy_set_header     Connection "upgrade";
      proxy_set_header     Host $host;
      proxy_read_timeout   86400s;
    }

    # Next.js immutable static assets
    location /_next/static/ {
      proxy_pass http://frontend;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else → Next.js
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

